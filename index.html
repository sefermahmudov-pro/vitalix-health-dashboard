<!DOCTYPE html>
<html lang="az">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vitalix | Health Metrics</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

</head>

<body class="themeIdeal">

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">

<h1>Vitalix</h1>

<p class="topSubtitle">
Sa臒lam h蓹yat 眉莽眉n g眉nd蓹lik hesablamalar 馃挌
</p>

<div id="menu">

<button class="menuButton idealTheme activeButton"
onclick="showSection('ideal', event)">
陌deal 脟蓹ki
</button>

<button class="menuButton bmiTheme"
onclick="showSection('bmi', event)">
B蓹d蓹n K眉tl蓹 陌ndeksi
</button>

<button class="menuButton waterTheme"
onclick="showSection('water', event)">
G眉nd蓹lik Su Ehtiyac谋
</button>

<button class="menuButton calorieTheme"
onclick="showSection('calories', event)">
G眉nd蓹lik Kalori Ehtiyac谋
</button>

</div>

<div class="sectionInfo">

<h2 id="sectionTitle">
陌deal 脟蓹ki
</h2>

<p id="sectionSubtitle">
Boyunuzu daxil edin v蓹 ideal 莽蓹kinizi 枚yr蓹nin
</p>

</div>

<div class="contentArea">

<div id="idealInput" class="flexRow">

<input
id="weightInput"
type="number"
placeholder="Boy (cm)"
oninput="calculate()">

</div>

<div id="bmiInputs"
class="flexRow"
style="display:none;">

<input
id="weight"
type="number"
placeholder="Kilo (kg)"
oninput="calculate()">

<input
id="height"
type="number"
placeholder="Boy (cm)"
oninput="calculate()">

</div>

<div id="waterInput"
class="flexRow"
style="display:none;">

<input
id="kgInput"
type="number"
placeholder="Kilo (kg)"
oninput="calculate()">

</div>

<div id="caloriesInput"
class="flexRow"
style="display:none;">

<input
id="ageInput"
type="number"
placeholder="Ya艧"
oninput="calculate()">

<input
id="calorieHeightInput"
type="number"
placeholder="Boy (cm)"
oninput="calculate()">

<input
id="calorieWeightInput"
type="number"
placeholder="Kilo (kg)"
oninput="calculate()">

<select id="genderInput"
onchange="calculate()">

<option value="male">
Ki艧i
</option>

<option value="female">
Qad谋n
</option>

</select>

<select id="activityInput"
onchange="calculate()">

<option value="1.2">
Oturaq h蓹yat
</option>

<option value="1.375">
Az aktiv
</option>

<option value="1.55">
Orta aktiv
</option>

<option value="1.725">
脟ox aktiv
</option>

</select>

</div>

<div id="result">

<div class="resultHeader">

<span>馃搳</span>

<h2>N蓹tic蓹</h2>

</div>

<p id="resultText"></p>

</div>

</div>

</div>

<script>

function setResult(text){

if(text == ""){
document.getElementById("result").style.display = "none"
}
else{
document.getElementById("result").style.display = "block"
}

document.getElementById("resultText").innerText = text
}

function showSection(section,event){

document.body.className = ""

let buttons =
document.querySelectorAll(".menuButton")

buttons.forEach(button=>{
button.classList.remove("activeButton")
})

event.target.classList.add("activeButton")

let title =
document.getElementById("sectionTitle")

let subtitle =
document.getElementById("sectionSubtitle")

if(section == "ideal"){

document.body.classList.add("themeIdeal")

title.innerText = "陌deal 脟蓹ki"

subtitle.innerText =
"Boyunuzu daxil edin v蓹 ideal 莽蓹kinizi 枚yr蓹nin"
}

if(section == "bmi"){

document.body.classList.add("themeBMI")

title.innerText =
"B蓹d蓹n K眉tl蓹 陌ndeksi"

subtitle.innerText =
"Boy v蓹 莽蓹kiniz蓹 g枚r蓹 BMI hesablay谋n"
}

if(section == "water"){

document.body.classList.add("themeWater")

title.innerText =
"G眉nd蓹lik Su Ehtiyac谋"

subtitle.innerText =
"G眉nd蓹lik su ehtiyac谋n谋z谋 hesablay谋n"
}

if(section == "calories"){

document.body.classList.add("themeCalories")

title.innerText =
"G眉nd蓹lik Kalori Ehtiyac谋"

subtitle.innerText =
"Orqanizmin g眉nl眉k kalori ehtiyac谋n谋 枚yr蓹nin"
}

setResult("")

document.getElementById("idealInput").style.display = "none"

document.getElementById("bmiInputs").style.display = "none"

document.getElementById("waterInput").style.display = "none"

document.getElementById("caloriesInput").style.display = "none"

if(section == "ideal"){
document.getElementById("idealInput").style.display = "grid"
}

if(section == "bmi"){
document.getElementById("bmiInputs").style.display = "grid"
}

if(section == "water"){
document.getElementById("waterInput").style.display = "grid"
}

if(section == "calories"){
document.getElementById("caloriesInput").style.display = "grid"
}
}

function calculate(){

setResult("")

if(
document.getElementById("idealInput").style.display
== "grid"
){

let value =
document.getElementById("weightInput").value

if(value == ""){
return
}

let height = Number(value)

let idealWeight = height - 100

setResult(
"S蓹nin ideal 莽蓹ki aral谋臒谋n: "
+ idealWeight +
" kg"
)
}

if(
document.getElementById("bmiInputs").style.display
== "grid"
){

let weightValue =
document.getElementById("weight").value

let heightValue =
document.getElementById("height").value

if(weightValue == "" || heightValue == ""){
return
}

let weight = Number(weightValue)

let height =
Number(heightValue / 100)

let bmi =
weight / (height * height)

let bmiText =
bmi.toFixed(2)

if(bmi < 18.5){

setResult(
"BM陌: " +
bmiText +
" - 脟蓹ki azd谋r"
)
}

else if(bmi >= 18.5 && bmi < 25){

setResult(
"B蓹d蓹n K眉tl蓹 陌ndeksi: "
+ bmiText +
" - Normal"
)
}

else{

setResult(
"B蓹d蓹n K眉tl蓹 陌ndeksi: "
+ bmiText +
" - Art谋q 莽蓹ki"
)
}
}

if(
document.getElementById("waterInput").style.display
== "grid"
){

let kgValue =
document.getElementById("kgInput").value

if(kgValue == ""){
return
}

let water =
(kgValue * 35) / 1000

setResult(
"G眉nd蓹lik t枚vsiy蓹 olunan su miqdar谋: "
+ water.toFixed(2)
+ " L"
)
}

if(
document.getElementById("caloriesInput").style.display
== "grid"
){

let age =
Number(document.getElementById("ageInput").value)

let height =
Number(document.getElementById("calorieHeightInput").value)

let weight =
Number(document.getElementById("calorieWeightInput").value)

let gender =
document.getElementById("genderInput").value

let activity =
Number(document.getElementById("activityInput").value)

if(
age == "" ||
height == "" ||
weight == ""
){
return
}

let bmr

if(gender == "male"){

bmr =
10 * weight +
6.25 * height -
5 * age +
5
}

else{

bmr =
10 * weight +
6.25 * height -
5 * age -
161
}

let calories =
(bmr * activity).toFixed(0)

setResult(
"G眉nd蓹lik kalori ehtiyac谋n: "
+ calories +
" kcal"
)
}
}

</script>

</body>
</html>
